name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "bug"
  - title: "Performance"
    labels:
      - "performance"
  - title: "Refactoring"
    labels:
      - "refactor"
  - title: "Tests"
    labels:
      - "tests"
  - title: "Documentation"
    labels:
      - "documentation"
  - title: "CI/CD"
    labels:
      - "ci-cd"
  - title: "Dependencies"
    labels:
      - "dependencies"
  - title: "Maintenance"
    labels:
      - "chore"

exclude-labels:
  - "skip-changelog"
  - "duplicate"
  - "invalid"
  - "wontfix"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "bug"
      - "dependencies"
      - "chore"
      - "ci-cd"
      - "refactor"
      - "performance"
      - "tests"
      - "documentation"
  default: patch

autolabeler:
  - label: "ci-cd"
    title:
      - "/^chore\\((ci-?cd|actions|workflows?)\\)/i"
  - label: "dependencies"
    title:
      - "/^chore\\(deps\\)/i"
  - label: "feature"
    title:
      - "/^feat/i"
  - label: "bug"
    title:
      - "/^fix/i"
  - label: "chore"
    title:
      - "/^chore(?!\\()/i"
  - label: "refactor"
    title:
      - "/^refactor/i"
  - label: "documentation"
    title:
      - "/^docs?/i"
    files:
      - "*.md"
  - label: "performance"
    title:
      - "/^perf/i"
  - label: "tests"
    title:
      - "/^tests?/i"

template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
