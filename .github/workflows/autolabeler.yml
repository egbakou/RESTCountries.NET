name: Auto Labeler

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions: {}

jobs:
  auto_label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter/autolabeler@eada3c96a64734dd381cfbda23511034e328ddb0 # v7.6.0
        with:
          config-name: release-drafter-template.yml
