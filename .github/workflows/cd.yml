name: CD

on:
  release:
    types: [released]

permissions: {}

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        persist-credentials: false

    - name: Setup .NET Core
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
      with:
        dotnet-version: 10.0.x

    - name: Build
      run: dotnet build --configuration Release
      working-directory: ./src/RESTCountries.NET
      
    - name: Run unit tests
      run: dotnet test --configuration Release
      working-directory: ./tests/RESTCountries.NET.Tests

    - name: Pack
      run: dotnet pack --configuration Release -p:Version=${RELEASE_VERSION#v} -o nupkg
      working-directory: ./src/RESTCountries.NET
      env:
        RELEASE_VERSION: ${{ github.event.release.tag_name }}

    - name: Publish to NuGet # zizmor: ignore[use-trusted-publishing]
      run: dotnet nuget push ./src/RESTCountries.NET/nupkg/*.nupkg -k $NUGET_AUTH_TOKEN -s https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY }}
